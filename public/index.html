<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-store" />
    <meta http-equiv="pragma" content="no-cache" />
    <title>Auditor Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #667085;
        --line: #d7dde6;
        --accent: #087f8c;
        --good: #2f8f46;
        --warn: #a15c00;
        --bad: #b42318;
        --soft: #edf7f8;
        --shadow: 0 2px 8px rgba(18, 32, 43, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      .page {
        min-height: 100vh;
        padding: 8px;
        display: grid;
        align-content: start;
        gap: 8px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 26px;
        line-height: 1.2;
      }

      .subtitle {
        color: var(--muted);
        font-size: 13px;
        margin-top: 4px;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .pill {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 11px;
        font-size: 12px;
        font-weight: 750;
        box-shadow: var(--shadow);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(6, minmax(140px, 1fr));
        gap: 8px;
      }

      .card,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .card {
        min-height: 78px;
        padding: 8px 10px;
        display: grid;
        grid-template-columns: 64px minmax(96px, auto) minmax(0, 1fr);
        grid-template-rows: auto auto;
        align-items: center;
        column-gap: 10px;
        row-gap: 5px;
        min-width: 0;
      }

      .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .value {
        font-size: 24px;
        font-weight: 850;
        line-height: 1;
        min-width: 0;
        overflow: visible;
        text-align: right;
      }

      .detail {
        color: var(--muted);
        font-size: 11px;
        min-height: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .bar {
        height: 7px;
        min-width: 0;
        width: 100%;
        border-radius: 999px;
        background: #e8edf3;
        overflow: hidden;
      }

      .card > .detail {
        grid-column: 1 / -1;
      }

      .limits-card {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .limit-row {
        display: grid;
        grid-template-columns: minmax(70px, 1fr) 48px 44px;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }

      .limit-row strong {
        font-weight: 850;
      }

      .limit-row span {
        color: var(--muted);
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .bar-fill {
        height: 100%;
        width: 0;
        background: var(--accent);
        border-radius: inherit;
        transition: width 180ms ease;
      }

      .bar-fill.warn {
        background: var(--warn);
      }

      .bar-fill.bad {
        background: var(--bad);
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 8px;
      }

      .panel {
        min-width: 0;
        overflow: hidden;
      }

      .panel header {
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        position: relative;
      }

      .panel h2 {
        font-size: 13px;
      }

      .help-tooltip {
        position: relative;
        width: 26px;
        height: 26px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #ffffff;
        color: var(--accent);
        display: inline-grid;
        place-items: center;
        cursor: help;
        flex: 0 0 auto;
        padding: 0;
      }

      .help-tooltip svg {
        width: 17px;
        height: 17px;
        display: block;
      }

      .help-tooltip::after {
        content: attr(data-tooltip);
        position: absolute;
        right: 0;
        top: calc(100% + 7px);
        width: min(520px, calc(100vw - 36px));
        padding: 9px 11px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: #172133;
        box-shadow: var(--shadow);
        font-size: 12px;
        line-height: 1.35;
        text-align: left;
        white-space: normal;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-4px);
        transition: opacity 120ms ease, transform 120ms ease;
        z-index: 20;
      }

      .help-tooltip:hover::after,
      .help-tooltip:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      .content {
        padding: 8px 10px;
      }

      .disk-list,
      .service-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 6px;
      }

      .rules-config {
        display: grid;
        grid-template-columns: 120px minmax(220px, 1fr) 150px 150px auto;
        gap: 6px;
        align-items: center;
      }

      .rules-config input,
      .rules-config button,
      .rules-config .rules-chip {
        height: 30px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
      }

      .rules-config input {
        min-width: 0;
        padding: 0 8px;
      }

      .rules-config button {
        padding: 0 12px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      .rules-summary {
        display: none;
      }

      .rules-chip {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 8px;
        background: #fbfcfe;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        display: flex;
        align-items: center;
      }

      .rules-chip strong {
        margin-right: 5px;
      }

      .rules-chip button,
      .rules-chip select {
        border: 0;
        border-radius: 5px;
        padding: 2px 7px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .rules-chip select {
        max-width: 145px;
      }

      .rules-list {
        display: grid;
        gap: 6px;
        margin-top: 8px;
      }

      .finding {
        border: 1px solid var(--line);
        border-left: 4px solid var(--warn);
        border-radius: 6px;
        padding: 6px 8px;
        background: #fffaf2;
        font-size: 12px;
      }

      .finding.critical {
        border-left-color: var(--bad);
        background: #fff5f5;
      }

      .finding .detail {
        margin-top: 3px;
        white-space: normal;
      }

      .finding .quote {
        margin-top: 5px;
        padding: 5px 7px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
        font: 12px/1.35 Consolas, "Cascadia Mono", monospace;
        white-space: normal;
        word-break: break-word;
      }

      .finding .suggestion {
        margin-top: 5px;
        padding: 5px 7px;
        border-radius: 5px;
        background: #eef8f9;
        color: var(--text);
        white-space: normal;
        word-break: break-word;
      }

      .disk,
      .service {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 8px;
        background: #fbfcfe;
        display: grid;
        gap: 5px;
      }

      .disk-top,
      .service {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
      }

      .state {
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: 850;
      }

      .running {
        color: var(--good);
        background: #e9f7ee;
      }

      .stopped {
        color: var(--bad);
        background: #fdeceb;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font: 13px/1.45 Consolas, "Cascadia Mono", monospace;
        color: #293442;
      }

      @media (max-width: 1100px) {
        .cards {
          grid-template-columns: repeat(3, minmax(120px, 1fr));
        }
      }

      @media (max-width: 760px) {
        .cards {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 520px) {
        .page {
          padding: 6px;
        }

        .cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="cards">
        <article class="card">
          <div class="label">CPU</div>
          <div class="value" id="cpuValue">-</div>
          <div class="bar"><div class="bar-fill" id="cpuBar"></div></div>
          <div class="detail" id="cpuDetail">current load</div>
        </article>
        <article class="card">
          <div class="label">Memory</div>
          <div class="value" id="memoryValue">-</div>
          <div class="bar"><div class="bar-fill" id="memoryBar"></div></div>
          <div class="detail" id="memoryDetail">used / total</div>
        </article>
        <article class="card">
          <div class="label">GPU</div>
          <div class="value" id="gpuValue">-</div>
          <div class="bar"><div class="bar-fill" id="gpuBar"></div></div>
          <div class="detail" id="gpuDetail">current load</div>
        </article>
        <article class="card">
          <div class="label">Disk C:</div>
          <div class="value" id="diskValue">-</div>
          <div class="bar"><div class="bar-fill" id="diskBar"></div></div>
          <div class="detail" id="diskDetail">used / total</div>
        </article>
        <article class="card">
          <div class="label">Chat</div>
          <div class="value" id="tokenValue">-</div>
          <div class="bar"><div class="bar-fill" id="tokenBar"></div></div>
          <div class="detail" id="tokenDetail">tokens in this dialog</div>
        </article>
        <article class="card limits-card">
          <div class="limit-row">
            <strong id="limitPrimaryLabel">5ч</strong>
            <span id="limitPrimaryPercent">-</span>
            <span id="limitPrimaryReset">-</span>
          </div>
          <div class="limit-row">
            <strong id="limitSecondaryLabel">Еженедельно</strong>
            <span id="limitSecondaryPercent">-</span>
            <span id="limitSecondaryReset">-</span>
          </div>
        </article>
      </section>

      <section class="grid">
        <article class="panel">
          <header><h2>Disks</h2></header>
          <div class="content disk-list" id="diskList"></div>
        </article>
        <article class="panel">
          <header class="panel-header">
            <h2>Правила ИИ</h2>
            <button
              class="help-tooltip"
              type="button"
              aria-label="Подсказка по UNC-пути"
              data-tooltip="UNC-путь читается учетной записью службы. Если служба работает как LocalSystem, сетевой ресурс должен разрешать доступ этой учетной записи или машине."
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
                <path d="M9.1 9a3 3 0 0 1 5.83 1c0 2-3 2.4-3 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M12 17h.01" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
              </svg>
            </button>
          </header>
          <div class="content">
            <form class="rules-config" id="rulesForm">
              <input id="rulesRole" name="role" value="Developer" placeholder="Роль" autocomplete="off" />
              <input id="rulesPath" name="rulesPath" placeholder="\\\\PC\\share\\rules\\developer.rules" autocomplete="off" />
              <div class="rules-chip"><strong>Статус</strong><span id="rulesStatus">-</span></div>
              <div class="rules-chip"><strong>Изменения</strong><span id="rulesChanges">-</span></div>
              <button type="submit">Сохранить</button>
            </form>
            <div class="rules-list" id="rulesFindings"></div>
          </div>
        </article>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let currentAlertAudio = null;
      let lastRulesAlertKey = "";
      let lastRulesAlertAt = 0;
      let rulesAlertTimer = null;
      const RULE_ALERT_INTERVAL_MS = 3000;
      const ALERT_SOUNDS = {
        relaxingBell: "/sounds/relaxing-bell-chime.mp3",
      };

      function pctClass(value) {
        if (value >= 90) return "bad";
        if (value >= 75) return "warn";
        return "";
      }

      async function signalRulesAlert(force = false) {
        const now = Date.now();
        if (!force && now - lastRulesAlertAt < RULE_ALERT_INTERVAL_MS - 100) return;
        lastRulesAlertAt = now;

        try {
          const source = ALERT_SOUNDS.relaxingBell;
          if (currentAlertAudio) {
            currentAlertAudio.pause();
            currentAlertAudio.currentTime = 0;
          }
          currentAlertAudio = new Audio(source);
          currentAlertAudio.volume = 0.9;
          await currentAlertAudio.play();
        } catch (error) {
          console.warn("Sound alert is blocked until page interaction.", error);
        }
      }

      function stopRulesAlert() {
        lastRulesAlertKey = "";
        lastRulesAlertAt = 0;
        if (rulesAlertTimer) {
          clearInterval(rulesAlertTimer);
          rulesAlertTimer = null;
        }
      }

      function signalRulesChanges(findings) {
        const criticalFindings = findings.filter((finding) => finding.severity === "critical");
        if (!criticalFindings.length) {
          stopRulesAlert();
          return;
        }

        const key = criticalFindings
          .map((finding) => [finding.severity, finding.type, finding.file, finding.line, finding.text].join(":"))
          .join("|");
        if (!rulesAlertTimer) {
          rulesAlertTimer = setInterval(() => {
            void signalRulesAlert();
          }, RULE_ALERT_INTERVAL_MS);
        }
        if (key === lastRulesAlertKey) return;
        lastRulesAlertKey = key;
        void signalRulesAlert();
      }

      function setBar(id, percent) {
        const bar = $(id);
        bar.style.width = `${Math.max(0, Math.min(100, percent || 0))}%`;
        bar.className = `bar-fill ${pctClass(percent)}`;
      }

      async function request(url, optionsOrTimeoutMs = 10000) {
        const options = typeof optionsOrTimeoutMs === "number" ? {} : optionsOrTimeoutMs;
        const timeoutMs = typeof optionsOrTimeoutMs === "number" ? optionsOrTimeoutMs : (options.timeoutMs ?? 10000);
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), timeoutMs);
        try {
          const response = await fetch(url, { ...options, signal: controller.signal, cache: "no-store" });
          const body = await response.json();
          if (!response.ok) throw new Error(body.error || response.statusText);
          return body;
        } finally {
          clearTimeout(timeout);
        }
      }

      function renderDisks(disks) {
        const list = $("diskList");
        list.innerHTML = "";
        for (const disk of disks) {
          const row = document.createElement("div");
          row.className = "disk";
          row.innerHTML = `
            <div class="disk-top"><strong></strong><span></span></div>
            <div class="bar"><div class="bar-fill"></div></div>
            <div class="detail"></div>
          `;
          row.querySelector("strong").textContent = disk.DeviceID;
          row.querySelector("span").textContent = `${disk.UsedPercent}%`;
          const fill = row.querySelector(".bar-fill");
          fill.style.width = `${disk.UsedPercent}%`;
          fill.className = `bar-fill ${pctClass(disk.UsedPercent)}`;
          row.querySelector(".detail").textContent = `${disk.UsedGB} GB used / ${disk.SizeGB} GB total / ${disk.FreeGB} GB free`;
          list.append(row);
        }
      }

      function renderCpu(cpu) {
        $("cpuValue").textContent = `${cpu.cpuPercent}%`;
        $("cpuDetail").textContent = `now ${new Date(cpu.sampledAt).toLocaleTimeString()}`;
        setBar("cpuBar", cpu.cpuPercent);
      }

      function renderMemory(memory) {
        $("memoryValue").textContent = `${memory.usedPercent}%`;
        $("memoryDetail").textContent = `${memory.usedGB} GB used / ${memory.totalGB} GB total / ${memory.freeGB} GB free`;
        setBar("memoryBar", memory.usedPercent);
      }

      function renderGpu(gpu) {
        const gpuPercent = gpu.utilizationPercent;
        $("gpuValue").textContent = gpuPercent === null || gpuPercent === undefined ? "n/a" : `${gpuPercent}%`;
        $("gpuDetail").textContent = `now ${new Date(gpu.sampledAt).toLocaleTimeString()}`;
        setBar("gpuBar", gpuPercent ?? 0);
      }

      function renderDiskMetrics(diskMetrics) {
        const disks = Array.isArray(diskMetrics.disks)
          ? diskMetrics.disks
          : diskMetrics.disks
            ? [diskMetrics.disks]
            : [];
        const cDisk = disks.find((disk) => disk.DeviceID === "C:") || disks[0];

        if (cDisk) {
          $("diskValue").textContent = `${cDisk.UsedPercent}%`;
          $("diskDetail").textContent = `${cDisk.UsedGB} GB used / ${cDisk.SizeGB} GB total / ${cDisk.FreeGB} GB free`;
          setBar("diskBar", cDisk.UsedPercent);
        }
        renderDisks(disks);
      }

      function renderTokenUsage(tokens) {
        if (!tokens.available) {
          $("tokenValue").textContent = "n/a";
          $("tokenDetail").textContent = tokens.message || "no local token_count";
          setBar("tokenBar", 0);
          renderLimits(null);
          return;
        }

        renderLimits(tokens.rateLimits);
        const thread = tokens.currentThread;
        if (!thread?.available) {
          $("tokenValue").textContent = "n/a";
          $("tokenDetail").textContent = thread?.message || "current dialog not found";
          setBar("tokenBar", 0);
          return;
        }

        $("tokenValue").textContent = thread.totalTokensFormatted || Number(thread.totalTokens ?? 0).toLocaleString("ru-RU");
        $("tokenDetail").textContent = `${Number(thread.totalTokens ?? 0).toLocaleString("ru-RU")} всего / ${thread.lastTotalTokensFormatted || "n/a"} последний ход`;
        setBar("tokenBar", 100);
      }

      function renderLimit(prefix, limit, fallbackLabel) {
        $(`${prefix}Label`).textContent = limit?.label || fallbackLabel;
        $(`${prefix}Percent`).textContent = limit?.remainingPercentFormatted || "-";
        $(`${prefix}Reset`).textContent = limit?.resetsIn || "-";
      }

      function renderLimits(rateLimits) {
        renderLimit("limitPrimary", rateLimits?.primary, "5ч");
        renderLimit("limitSecondary", rateLimits?.secondary, "Еженедельно");
      }

      function renderRules(status) {
        $("rulesStatus").textContent = status.status || "-";
        if (status.rulesFile || status.rulesPath) $("rulesPath").value = status.rulesFile || status.rulesPath;
        if (status.role) $("rulesRole").value = status.role;

        const changes = status.changes || { added: [], modified: [], deleted: [] };
        const changeCount = changes.added.length + changes.modified.length + changes.deleted.length;
        $("rulesChanges").textContent = changeCount;

        const list = $("rulesFindings");
        list.innerHTML = "";
        const findings = Array.isArray(status.findings) ? status.findings.slice(0, 10) : [];
        if (status.status === "critical") {
          signalRulesChanges(findings);
        } else {
          stopRulesAlert();
        }
        if (findings.length === 0) {
          const empty = document.createElement("div");
          empty.className = "detail";
          empty.textContent = status.configured === false ? "Укажите сетевой файл с правилами." : "Критичных находок нет.";
          list.append(empty);
          return;
        }

        for (const finding of findings) {
          const item = document.createElement("div");
          item.className = `finding ${finding.severity === "critical" ? "critical" : ""}`;
          const place = [finding.file, finding.line].filter(Boolean).join(":");
          item.innerHTML = `
            <strong></strong>
            <div class="detail"></div>
            <div class="quote"></div>
            <div class="suggestion"></div>
          `;
          item.querySelector("strong").textContent = `${finding.severity || "info"} / ${finding.type || "rule"} / ${place}`;
          item.querySelector(".detail").textContent = finding.message || finding.text || "";
          item.querySelector(".quote").textContent = finding.related
            ? `${finding.text}\n↳ ${finding.related.file}:${finding.related.line}: ${finding.related.text}`
            : finding.text || "";
          item.querySelector(".suggestion").textContent = finding.suggestion
            ? `Предложение: ${finding.suggestion}`
            : "Предложение: уточнить формулировку и убрать возможную лазейку.";
          list.append(item);
        }
      }

      async function refreshWidget(url, render, timeoutMs) {
        try {
          const data = await request(url, timeoutMs);
          render(data);
        } catch (error) {
          console.warn(error);
        }
      }

      const loops = [
        ["/api/metrics/cpu", renderCpu, 500, 1000],
        ["/api/metrics/memory", renderMemory, 500, 3000],
        ["/api/metrics/gpu", renderGpu, 500, 5000],
        ["/api/metrics/disks", renderDiskMetrics, 60000, 5000],
        ["/api/tokens", renderTokenUsage, 60000, 10000],
        ["/api/rules", renderRules, 60000, 10000],
      ];

      for (const [url, render, interval, timeoutMs] of loops) {
        const tick = async () => {
          const startedAt = performance.now();
          await refreshWidget(url, render, timeoutMs);
          const elapsed = performance.now() - startedAt;
          setTimeout(tick, Math.max(0, interval - elapsed));
        };
        void tick();
      }

      $("rulesForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const rulesPath = $("rulesPath").value.trim();
        const role = $("rulesRole").value.trim() || "Developer";
        if (!rulesPath) return;
        await request("/api/rules/configure", {
          method: "POST",
          body: JSON.stringify({ rulesFile: rulesPath, role }),
          headers: { "content-type": "application/json" },
        });
        await refreshWidget("/api/rules", renderRules, 10000);
      });

    </script>
  </body>
</html>
